<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="icon" href="data:," />
  <title>WebAR Floor Demo</title>

  <!-- three.js via import map (iOS Safari 16.4+). Only external dependency. -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
    }
  }
  </script>

  <link rel="stylesheet" href="./src/styles.css" />
</head>
<body>
  <!-- Layer 1: live camera feed -->
  <video id="camera" playsinline autoplay muted></video>
  <!-- Layer 2: transparent 3D canvas (inserted by three.js) -->

  <!-- Start gate: iOS needs a user tap before camera + motion access -->
  <div id="gate">
    <div class="card">
      <h1>WebAR Floor Test</h1>
      <p>Point your phone at the floor a couple of metres ahead, then tap start.
         Tilt and turn to see the tile stay flat on the ground.</p>
      <button id="startBtn">Start AR</button>
      <p class="hint" id="hint"></p>
    </div>
  </div>

  <!-- Tiny status HUD (top-left) — not a pop-up, just live state -->
  <div id="status" hidden></div>

  <!-- Slim, dismissible bottom banner — only appears if motion is blocked.
       Never traps the screen; the AR stays visible above it. -->
  <div id="motionBanner" hidden>
    <span id="motionMsg">Motion sensors are off. Enable <b>Settings ▸ Safari ▸ Motion &amp; Orientation Access</b>, then</span>
    <button id="retryMotion">Retry</button>
    <button id="dismissMotion" aria-label="dismiss">✕</button>
  </div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
